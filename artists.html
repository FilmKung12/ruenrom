<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศิลปินทั้งหมด | Ruenrom</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ========================================= */
        /* เล็กเอาต์ส่วนควบคุม (ค้นหา & จัดเรียง) */
        /* ========================================= */
        
        .controls-wrapper {
            display: grid;
            /* ปรับสัดส่วน: ซ้าย 1 ส่วน | กลาง(ค้นหา) 2 ส่วน | ขวา(จัดเรียง) 1 ส่วน */
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            align-items: center;
            max-width: 1000px;
            /* ความกว้างสูงสุดเท่ากับหัวข้อและเนื้อหา */
            margin: 0 auto 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        
        .controls-wrapper .search-box {
            width: 100%;
            max-width: 600px;
            /* 🌟 ปรับความยาวช่องค้นหาตรงนี้ (500px-700px กำลังสวย) */
            margin: 0;
            justify-self: center;
            /* จัดให้อยู่ตรงกลางของ Grid ช่องกลาง */
        }
        
        .controls-wrapper .sort-container {
            margin: 0;
            justify-self: end;
            /* ดันปุ่มจัดเรียงไปชิดขวาสุดให้ตรงขอบเนื้อหา */
        }
        /* 📱 สำหรับหน้าจอมือถือและแท็บเล็ต */
        
        @media (max-width: 768px) {
            .controls-wrapper {
                grid-template-columns: 1fr;
                /* เปลี่ยนเป็นแถวเดียวเสาเดียว */
                justify-items: center;
                gap: 15px;
            }
            .controls-wrapper .search-box {
                max-width: 100%;
                /* เต็มจอในมือถือ */
            }
            .controls-wrapper .sort-container {
                justify-self: center;
                /* จัดกลางในมือถือ */
            }
            /* ซ่อน div ว่างในมือถือ */
            .controls-wrapper div:first-child {
                display: none;
            }
        }
    </style>
</head>

<body>

    <header class="navbar">
        <a href="index.html" class="logo">Ruenrom 🎧</a>

        <nav id="menu" class="menu">
            <a href="index.html">หน้าหลัก</a>
            <a href="songs.html">เพลง</a>

            <a href="artists.html" class="active">ศิลปิน</a>

            <a href="likes.html">ถูกใจ</a>
            <a href="playlists.html">เพลย์ลิสต์</a>
        </nav>

        <div class="nav-actions">
            <button class="dark-mode-btn" onclick="toggleDarkMode()">🌙</button>
            <button class="menu-btn" onclick="toggleMenu()">☰</button>

        </div>
    </header>

    <section class="all-artists-section" style="max-width: 1000px; margin: 40px auto; padding: 0 20px; text-align: center;">

        <h2 class="title" style="color: #7B4F2C; margin-bottom: 25px; font-size: 28px;">ศิลปินทั้งหมด</h2>

        <div class="controls-wrapper">

            <div></div>

            <form class="search-box" onsubmit="return false;">
                <div class="search-input" style="position: relative; width: 100%;">
                    <span class="search-icon" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #7B4F2C;">🔎</span>
                    <input type="text" id="searchArtistInput" placeholder="ค้นหาชื่อศิลปิน..." autocomplete="off" style="width: 100%; padding: 12px 15px 12px 45px; border-radius: 25px; border: 1px solid #d6c4b0; background-color: #fdfaf7; color: #4A3728; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                    <span id="clearArtistSearch" class="clear-search" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; display: none;">✖</span>
                </div>
            </form>

            <div class="sort-container">
                <select id="artistSortSelect" class="sort-select" onchange="applyArtistSort()" ...>
    <option value="default">เรียงตามลำดับเดิม</option>
    <option value="newest">เพิ่งเพิ่มล่าสุด ✨</option> <option value="name-asc">ชื่อศิลปิน (ก-ฮ, A-Z)</option>
    <option value="name-desc">ชื่อศิลปิน (ฮ-ก, Z-A)</option>
</select>
            </div>

        </div>

        <div id="artists" class="artist-container"></div>

    </section>

    <script src="script.js"></script>

</body>

</html>
